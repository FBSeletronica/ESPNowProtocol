name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

      # Only run if a release PR was created or updated
      - name: Update library.properties version
        if: steps.release.outputs.release_created == 'true'
        run: |
          VERSION=${{ steps.release.outputs.tag_name }}
          VERSION=${VERSION#v}

          echo "Updating library.properties to version $VERSION"

          sed -i "s/^version=.*/version=$VERSION/" library.properties

      - name: Commit updated library.properties
        if: steps.release.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add library.properties
          git commit -m "chore: sync library.properties version with release"
          git push