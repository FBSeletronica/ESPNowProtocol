name: Release

on:
  workflow_run:
    workflows: ["Arduino CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    # Run only when:
    # - CI succeeded
    # - Event was push (not PR)
    # - Branch is main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

      - name: Update library.properties version
        if: steps.release.outputs.release_created == 'true'
        run: |
          VERSION=${{ steps.release.outputs.tag_name }}
          VERSION=${VERSION#v}

          echo "Updating library.properties to version $VERSION"

          sed -i "s/^version=.*/version=$VERSION/" library.properties

      - name: Commit updated library.properties
        if: steps.release.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add library.properties
          git commit -m "chore: sync library.properties version with release [skip ci]"
          git push