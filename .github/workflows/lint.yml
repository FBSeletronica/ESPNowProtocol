name: Arduino CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - esp32:esp32:esp32
          - esp32:esp32:esp32c3
          - esp32:esp32:esp32s3
          - esp32:esp32:esp32s2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache Arduino directories to speed up builds
      - name: Cache Arduino
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: ${{ runner.os }}-arduino-${{ hashFiles('**/*.ino', '**/*.h', '**/*.cpp') }}

      # Install Arduino Lint
      - name: Install Arduino Lint
        run: |
          mkdir -p ~/bin
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-lint/main/etc/install.sh | BINDIR=~/bin sh

      # Add Arduino Lint to PATH
      - name: Add Arduino Lint to PATH
        run: echo "$HOME/bin" >> $GITHUB_PATH

      # Run Arduino Lint in strict mode for Library Manager compliance
      - name: Run Arduino Lint
        run: arduino-lint --compliance strict --library-manager submit

      # Setup Arduino CLI
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      # Update core index
      - name: Update index
        run: arduino-cli core update-index

      # Install ESP32 core
      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32

      # Install current library into Arduino libraries folder
      - name: Install current library
        run: |
          mkdir -p ~/Arduino/libraries
          ln -s $GITHUB_WORKSPACE ~/Arduino/libraries/ESPNowProtocol

      # Compile all examples for each board in the matrix
      - name: Compile all examples
        run: |
          set -e

          for d in examples/*; do
            echo "::group::Compiling $d for ${{ matrix.fqbn }}"
            arduino-cli compile \
              --fqbn ${{ matrix.fqbn }} \
              "$d"
            echo "::endgroup::"
          done